<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Chores</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bone: #f0e9d6;
        --surface: #f9f4e8;
        --border: #c9b99a;
        --border-md: rgba(80, 55, 20, 0.15);
        --text: #2c1a06;
        --muted: #5a3e22;
        --faint: #7a5c3a;
        --serif: "Instrument Serif", Georgia, serif;
        --sans: "Plus Jakarta Sans", "Helvetica Neue", Arial, sans-serif;
        --spring: cubic-bezier(0.16, 1, 0.3, 1);
        --snap: cubic-bezier(0.32, 0.72, 0, 1);
      }

      body {
        background: var(--bone);
        font-family: var(--sans);
        color: var(--text);
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ─────────────────────────────────────────────────────── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 40px 48px 32px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
      }

      .header-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #5a2e00;
        background: #e8d4a8;
        border: 1px solid #c4a060;
        padding: 3px 9px 3px 7px;
        border-radius: 9999px;
        margin-bottom: 12px;
      }

      h1 {
        font-family: var(--serif);
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      h1 em {
        font-style: italic;
        color: var(--muted);
      }

      .header-meta {
        font-size: 13px;
        color: var(--faint);
        margin-top: 6px;
        word-spacing: 0.08em;
      }

      .header-meta strong {
        color: var(--muted);
        font-weight: 700;
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9999px;
        padding: 6px 14px 6px 10px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #2a5c2d;
        flex-shrink: 0;
      }

      /* ── Nav tabs ────────────────────────────────────────────────────── */
      .nav {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 48px;
        position: sticky;
        top: 0;
        z-index: 40;
        display: flex;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .nav::-webkit-scrollbar {
        display: none;
      }

      .tab {
        flex-shrink: 0;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 14px 18px;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 180ms var(--snap),
          border-color 180ms var(--snap);
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--text);
        border-bottom-color: var(--text);
      }

      /* live dot after "This Week" tab */
      .tab[data-tab="current"]::after {
        content: "";
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #2a5c2d;
        margin-left: 6px;
        vertical-align: middle;
        position: relative;
        top: -1px;
      }

      .nav-sep {
        flex: 1;
      }

      /* ── Main ────────────────────────────────────────────────────────── */
      .main {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 48px 80px;
      }

      /* ── Week header inside main ─────────────────────────────────────── */
      .week-heading {
        margin-bottom: 24px;
      }

      .week-heading-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
      }

      .week-heading-title {
        font-family: var(--serif);
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.025em;
        line-height: 1.1;
        color: var(--text);
      }

      .week-heading-title em {
        font-style: italic;
        color: var(--muted);
      }

      .week-date-range {
        font-size: 14px;
        color: var(--faint);
        letter-spacing: 0.01em;
      }

      /* ── Chore grid ──────────────────────────────────────────────────── */
      /*
   * 4 cards in a row at wide widths. Hallways is visually distinct
   * but sits in the same grid - it gets a green tint via inline style.
   */
      .chore-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 40px;
      }

      /* ── Chore card ──────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        transition: box-shadow 220ms var(--spring);
      }
      .card:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      }

      /* coloured top accent line */
      .card-accent {
        height: 3px;
        border-radius: 2px;
        margin-bottom: 2px;
        flex-shrink: 0;
      }

      .card-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
      }

      .card-chore {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.2;
      }

      /* Assignee list */
      .assignees {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }

      .assignee {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .assignee-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Mark done button */
      .mark-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 12px;
        border-radius: 6px;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bone);
        color: var(--muted);
        transition:
          background 160ms var(--snap),
          color 160ms var(--snap),
          border-color 160ms var(--snap),
          transform 160ms var(--snap);
        align-self: flex-start;
      }
      .mark-btn:hover {
        background: #dfd3bb;
        color: var(--text);
      }
      .mark-btn:active {
        transform: scale(0.97);
      }
      .mark-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .mark-btn.done {
        background: #d4e8d0;
        color: #1c4a20;
        border-color: #8bbf8e;
      }
      .mark-btn.done:hover {
        background: #c4ddc0;
      }

      .mark-btn.loading {
        background: var(--bone);
        color: var(--faint);
        border-color: var(--border);
      }

      /* Hallways card: green-tinted */
      .card.hallways {
        background: #e8f0e4;
        border-color: #8bbf8e;
      }

      /* Task checklist */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-top: 2px;
        border-top: 1px solid var(--border);
      }

      .task-item {
        display: flex;
        align-items: baseline;
        gap: 7px;
        font-size: 12.5px;
        color: var(--muted);
        line-height: 1.4;
      }

      .task-item::before {
        content: "";
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--faint);
        flex-shrink: 0;
        margin-top: 5px;
      }

      /* ── Rotation reference table ────────────────────────────────────── */
      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 14px;
      }

      .ref-table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 48px;
      }

      table {
        width: 100%;
        min-width: 560px;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead th {
        background: var(--bone);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
        padding: 11px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      tbody td {
        padding: 12px 16px;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr.is-now td {
        background: #ede4cc;
      }
      tbody tr.is-now td:first-child {
        border-left: 2px solid var(--text);
      }

      .now-pill {
        display: inline-block;
        background: var(--text);
        color: var(--surface);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 9999px;
        margin-left: 7px;
        vertical-align: middle;
      }

      .chore-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 5px;
        border: 1px solid;
        margin: 2px 2px 2px 0;
      }

      /* ── Skeleton ────────────────────────────────────────────────────── */
      @keyframes shimmer {
        0% {
          background-position: -600px 0;
        }
        100% {
          background-position: 600px 0;
        }
      }
      .skel {
        background: linear-gradient(
          90deg,
          #ddd0b0 25%,
          #cfc0a0 50%,
          #ddd0b0 75%
        );
        background-size: 1200px 100%;
        animation: shimmer 1.3s ease infinite;
        border-radius: 10px;
      }
      .skel-card {
        height: 180px;
        border-radius: 12px;
      }

      /* ── Error ───────────────────────────────────────────────────────── */
      .err {
        background: #f2d5d0;
        border: 1px solid #c4776a;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 14px;
        color: #7a2018;
        margin-bottom: 20px;
      }

      /* ── Footer ──────────────────────────────────────────────────────── */
      .footer {
        border-top: 1px solid var(--border);
        padding-top: 20px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .footer span {
        font-size: 12.5px;
        color: var(--faint);
        letter-spacing: 0.03em;
        word-spacing: 0.08em;
      }
      .footer span strong {
        color: var(--muted);
        font-weight: 700;
      }
      .footer-credit {
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: var(--faint);
        letter-spacing: 0.04em;
        margin-top: 4px;
      }
      .footer-credit a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1px;
        transition:
          color 160ms,
          border-color 160ms;
      }
      .footer-credit a:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      /* ── Send-reminders button ───────────────────────────────────────── */
      .send-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 14px;
        border-radius: 7px;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        background: var(--text);
        color: var(--surface);
        border: 1px solid var(--text);
        transition:
          background 160ms var(--snap),
          transform 160ms var(--snap);
        white-space: nowrap;
      }
      .send-btn:hover {
        background: #1a0c02;
      }
      .send-btn:active {
        transform: scale(0.97);
      }
      .send-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        opacity: 0;
        background: var(--text);
        color: var(--surface);
        font-size: 14px;
        font-weight: 500;
        padding: 11px 18px;
        border-radius: 9px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 200;
        transition:
          opacity 240ms var(--spring),
          transform 240ms var(--spring);
        max-width: calc(100vw - 40px);
        text-align: center;
      }
      .toast.toast-err {
        background: #7a2018;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── Animations ──────────────────────────────────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade {
        animation: fadeUp 550ms var(--spring) both;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Responsive ──────────────────────────────────────────────────── */

      /* 4-col → 2-col at 768px (tablet portrait) */
      @media (max-width: 768px) {
        .chore-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 640px - mobile landscape and below */
      @media (max-width: 640px) {
        .header {
          padding: 24px 16px 20px;
          gap: 16px;
        }
        .nav {
          padding: 0 16px;
        }
        .main {
          padding: 24px 16px 60px;
        }
        .chore-grid {
          grid-template-columns: 1fr;
        }
        .week-heading-title {
          font-size: 22px;
        }
        .footer {
          flex-direction: column;
          gap: 4px;
        }
        table {
          font-size: 13px;
        }
        thead th,
        tbody td {
          padding: 10px 12px;
        }
      }

      /* 375px - standard phone */
      @media (max-width: 375px) {
        .header {
          padding: 20px 14px 16px;
        }
        .nav {
          padding: 0 14px;
        }
        .main {
          padding: 20px 14px 52px;
        }
        .chore-chip {
          font-size: 11px;
          padding: 2px 6px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Header ── -->
    <header class="header">
      <div>
        <div class="header-eyebrow">
          <svg
            width="9"
            height="9"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M1 6L8 1l7 5v8a1 1 0 01-1 1H2a1 1 0 01-1-1z" />
            <path d="M6 15V9h4v6" />
          </svg>
          House Chores
        </div>
        <h1>Chores <em>Tracker</em></h1>
        <p class="header-meta">
          5 people &middot; <strong>assigned:</strong> tuesday &middot;
          <strong>due:</strong> monday &middot;
          <strong>trash pickup:</strong> monday
        </p>
      </div>
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 10px;
        "
      >
        <div class="live-badge">
          <span class="live-dot"></span>
          <span id="live-label">Loading&hellip;</span>
        </div>
        <button
          class="send-btn"
          id="send-btn"
          onclick="sendReminders()"
          title="Send email reminders to all housemates for the current week"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M14 2L8.5 8M14 2l-4.5 12-1-5.5L2 7l12-5z" />
          </svg>
          Send reminders
        </button>
      </div>
    </header>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- ── Nav ── -->
    <nav class="nav" role="tablist">
      <button
        class="tab active"
        data-tab="current"
        onclick="switchTab('current')"
        role="tab"
      >
        This Week
      </button>
      <span class="nav-sep" aria-hidden="true"></span>
      <button
        class="tab"
        data-tab="rotation"
        onclick="switchTab('rotation')"
        role="tab"
      >
        Upcoming
      </button>
    </nav>

    <!-- ── Main ── -->
    <main class="main" id="main" role="tabpanel" aria-live="polite"></main>

    <script>
      "use strict";

      // ── State ────────────────────────────────────────────────────────────────────

      /** @type {object|null} */
      let META = null;

      /** @type {string} */
      let activeTab = "current";

      /** @type {Map<number, object>} */
      const cache = new Map();

      // ── SVG icon fragments (all at 14×14, stroke-width 1.75) ─────────────────────

      /** Escapes a string for safe injection into innerHTML. */
      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      const ICONS = {
        check: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8l3.5 3.5L13 5"/></svg>`,
        circle: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/></svg>`,
        spin: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="animation:spin 0.75s linear infinite"><path d="M8 2a6 6 0 110 12"/></svg>`,
        bath: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 17a2 2 0 002 2h14a2 2 0 002-2v-1H3v1z"/><path d="M3 16h18M3 11h18M7 11V5a2 2 0 012-2h2a2 2 0 012 2v6"/></svg>`,
        trash: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`,
        kitchen: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a4 4 0 00-4 4v2h8V6a4 4 0 00-4-4z"/><rect x="4" y="8" width="16" height="13" rx="1"/><path d="M8 8v13M16 8v13"/></svg>`,
        hallway: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21l5-5"/><path d="M7.5 16L13 6c.5-.9 1.7-1.2 2.6-.7l1.2.7c.9.5 1.1 1.7.5 2.5L12 17l-1.5-1z"/></svg>`,
      };

      // Chore styles and icon keys come from META.chore_meta after init.
      // Access via choreDef(chore) - do not use before META is loaded.

      function choreDef(chore) {
        const m = META.chore_meta[chore];
        return {
          icon: m.icon,
          color: m.color,
          bg: m.bg,
          border: m.border,
          textColor: m.text_color,
        };
      }

      // ── Boot ─────────────────────────────────────────────────────────────────────

      (async function init() {
        renderSkeletons();
        try {
          META = await api("/api/meta");
        } catch {
          showErr("Could not reach the API. Is the Flask server running?");
          return;
        }

        document.getElementById("live-label").textContent = weekDateLabel(
          META.current_week_abs,
        );

        await switchTab("current");
      })();

      // ── Tab switching ─────────────────────────────────────────────────────────────

      /** @param {string} tab */
      async function switchTab(tab) {
        activeTab = tab;
        document
          .querySelectorAll(".tab")
          .forEach((btn) =>
            btn.classList.toggle("active", btn.dataset.tab === tab),
          );

        if (tab === "rotation") {
          renderRotation();
          return;
        }

        const weekAbs = META.current_week_abs;

        if (cache.has(weekAbs)) {
          renderWeek(cache.get(weekAbs));
          return;
        }

        renderSkeletons();
        try {
          const data = await api(`/api/schedule/${weekAbs}`);
          cache.set(weekAbs, data);
          renderWeek(data);
        } catch {
          showErr("Failed to load the schedule. Please refresh.");
        }
      }

      /**
       * Formats the week range for a given absolute week index.
       * Weeks run Tue → Mon (assigned Tuesday, trash/deadline Monday).
       */
      function weekDateLabel(weekAbs) {
        // Parse as local midnight to avoid UTC-offset date shifts.
        const start = new Date(`${META.start_date}T00:00:00`);
        // start_date is the Monday anchoring week 0; +1 day lands on Tuesday.
        const tuesday = new Date(
          start.getTime() + (weekAbs * 7 + 1) * 86400000,
        );
        const monday = new Date(tuesday.getTime() + 6 * 86400000);
        const fmt = (d) =>
          d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
        return `${fmt(tuesday)} – ${fmt(monday)}`;
      }

      // ── Renderers ─────────────────────────────────────────────────────────────────

      function renderSkeletons() {
        document.getElementById("main").innerHTML = `
    <div class="chore-grid" style="margin-bottom:40px">
      ${Array(4).fill(`<div class="skel skel-card"></div>`).join("")}
    </div>
    <div class="skel" style="height:180px;border-radius:12px"></div>`;
      }

      /**
       * @param {object} data - /api/schedule response
       */
      function renderWeek(data) {
        const { week_abs, schedule, statuses } = data;
        const dateRange = weekDateLabel(week_abs);

        const cards = Object.keys(META.pools)
          .map((chore) => buildCard({ chore, schedule, statuses, week_abs }))
          .join("");

        document.getElementById("main").innerHTML = `
    <div class="week-heading fade">
      <div class="week-heading-row">
        <div class="week-heading-title">This week <em>now</em></div>
        <span class="week-date-range">${dateRange}</span>
      </div>
    </div>
    <div class="chore-grid fade" style="animation-delay:50ms">${cards}</div>
    ${buildRotationTable()}
    <div class="footer fade" style="animation-delay:200ms">
      <span>house chores &middot; <strong>assigned:</strong> Tue &middot; <strong>due:</strong> Mon</span>
      <span><strong>statuses</strong> synced via Upstash Redis</span>
      <p class="footer-credit">built by <a href="https://pratyushsudhakar.com" target="_blank" rel="noopener">Pratyush Sudhakar</a></p>
    </div>`;
      }

      /**
       * Builds one chore card.
       * @param {{chore:string, schedule:object, statuses:object, week_abs:number}} p
       */
      function buildCard({ chore, schedule, statuses, week_abs }) {
        const def = choreDef(chore);

        const assignees = Object.entries(schedule)
          .filter(([, chores]) => chores.includes(chore))
          .map(([name]) => name);

        const allDone =
          assignees.length > 0 &&
          assignees.every((name) => (statuses[name] ?? {})[chore] === "done");

        const assigneeHTML = assignees
          .map((name) => {
            const color = META.housemates[name]?.color ?? "#787774";
            const trashDay = META.housemates[name]?.trash_day;
            const daySuffix =
              chore === "Trash" && trashDay
                ? `<span style="opacity:0.55;font-size:0.72em;margin-left:3px">(${esc(trashDay)})</span>`
                : "";
            return `<div class="assignee">
      <span class="assignee-dot" style="background:${esc(color)}"></span>
      ${esc(name)}${daySuffix}
    </div>`;
          })
          .join("");

        const nextStatus = allDone ? "pending" : "done";
        const assigneesAttr = JSON.stringify(assignees).replace(/"/g, "&quot;");
        const btnClass = allDone ? "done" : "pending";
        const btnLabel = allDone ? "Done" : "Mark done";
        const btnIcon = allDone ? ICONS.check : ICONS.circle;

        const tasks = (META.chore_tasks[chore] ?? [])
          .map((t) => `<div class="task-item">${esc(t)}</div>`)
          .join("");

        return `
    <div class="card${chore === "Hallways" ? " hallways" : ""}">
      <div class="card-accent" style="background:${def.color}"></div>
      <div>
        <div class="card-label">${chore}</div>
        <div class="card-chore">${chore}</div>
      </div>
      <div class="assignees">${assigneeHTML}</div>
      ${tasks ? `<div class="task-list">${tasks}</div>` : ""}
      <button class="mark-btn ${btnClass}"
        data-chore="${chore}"
        data-week-abs="${week_abs}"
        data-assignees="${assigneesAttr}"
        data-next="${nextStatus}"
        onclick="markTask(this)">
        ${btnIcon} ${btnLabel}
      </button>
    </div>`;
      }

      function renderRotation() {
        document.getElementById("main").innerHTML = `
    <p class="section-label fade">Upcoming rotation</p>
    ${buildRotationTable()}
    <div class="footer fade" style="animation-delay:160ms">
      <span>house chores &middot; <strong>assigned:</strong> Tue &middot; <strong>due:</strong> Mon</span>
      <span><strong>statuses</strong> synced via Upstash Redis</span>
      <p class="footer-credit">built by <a href="https://pratyushsudhakar.com" target="_blank" rel="noopener">Pratyush Sudhakar</a></p>
    </div>`;
      }

      function buildRotationTable() {
        if (!META) return "";

        const chores = Object.keys(META.pools);
        const SLOTS = 6;
        const cur = META.current_week_abs;

        const chip = (chore, names) => {
          const d = choreDef(chore);
          const label = names
            .map((n) => {
              const trashDay = META.housemates[n]?.trash_day;
              return chore === "Trash" && trashDay ? `${n} (${trashDay})` : n;
            })
            .join(" + ");
          return `<span class="chore-chip" style="background:${d.bg};color:${d.textColor};border-color:${d.border}">
        ${ICONS[d.icon]} ${label}
      </span>`;
        };

        const rows = Array.from({ length: SLOTS }, (_, i) => {
          const weekAbs = cur + i;
          const isCurrent = i === 0;
          const dateRange = weekDateLabel(weekAbs);
          const nowPill = isCurrent ? `<span class="now-pill">now</span>` : "";
          const weekLabel = `${dateRange}${nowPill}`;
          const cells = chores
            .map((chore) => {
              const pool = META.pools[chore];
              const assignees = pool[weekAbs % pool.length];
              return `<td>${chip(chore, assignees)}</td>`;
            })
            .join("");
          return `<tr class="${isCurrent ? "is-now" : ""}">
      <td><strong>${weekLabel}</strong></td>
      ${cells}
    </tr>`;
        }).join("");

        const headers = chores.map((c) => `<th>${c}</th>`).join("");
        return `
    <div class="ref-table-wrap fade" style="animation-delay:80ms">
      <table>
        <thead><tr><th>Period</th>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
      }

      // ── Task marking ──────────────────────────────────────────────────────────────

      /** @param {HTMLButtonElement} btn */
      async function markTask(btn) {
        const chore = btn.dataset.chore;
        const weekAbs = parseInt(btn.dataset.weekAbs, 10);
        const next = btn.dataset.next;
        const assignees = JSON.parse(
          btn.dataset.assignees.replace(/&quot;/g, '"'),
        );

        btn.disabled = true;
        btn.className = "mark-btn loading";
        btn.innerHTML = `${ICONS.spin} Saving`;

        try {
          await Promise.all(
            assignees.map((person) =>
              api("/api/mark", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  week_abs: weekAbs,
                  person,
                  chore,
                  status: next,
                }),
              }),
            ),
          );
          cache.delete(weekAbs);
          const fresh = await api(`/api/schedule/${weekAbs}`);
          cache.set(weekAbs, fresh);
          renderWeek(fresh);
        } catch {
          btn.disabled = false;
          btn.className = "mark-btn pending";
          btn.innerHTML = `${ICONS.circle} Retry`;
          showErr(`Could not update ${chore}. Please try again.`);
        }
      }

      // ── Helpers ───────────────────────────────────────────────────────────────────

      async function api(url, opts = {}) {
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error(`${res.status}`);
        return res.json();
      }

      function showErr(msg) {
        const el = document.getElementById("main");
        const d = document.createElement("div");
        d.className = "err";
        d.textContent = msg;
        el.prepend(d);
        setTimeout(() => d.remove(), 5000);
      }

      // ── Send reminders ────────────────────────────────────────────────────────────

      /**
       * Calls POST /api/send-reminders with mode "auto", which the server resolves
       * to "monday" or "sunday" based on the current day in EST.
       * Shows a toast with the result and disables the button during the request.
       */
      async function sendReminders() {
        if (!confirm("Send reminder emails to all housemates now?")) return;

        const btn = document.getElementById("send-btn");
        const originalHTML = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = `${ICONS.spin} Sending&hellip;`;

        try {
          const res = await api("/api/send-reminders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mode: "auto" }),
          });
          const label =
            res.mode === "sunday" ? "Sunday check-in" : "Monday kick-off";
          showToast(`${label} emails sent.`);
        } catch (err) {
          showToast("Failed to send emails. Check server logs.", true);
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalHTML;
        }
      }

      /**
       * Briefly shows a toast notification at the bottom of the screen.
       * @param {string} msg
       * @param {boolean} [isError=false]
       */
      function showToast(msg, isError = false) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = `toast${isError ? " toast-err" : ""}`;

        // Force a reflow so the transition fires even if already visible.
        void toast.offsetWidth;
        toast.classList.add("show");

        setTimeout(() => toast.classList.remove("show"), 4000);
      }
    </script>
  </body>
</html>
