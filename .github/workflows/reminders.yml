name: Chore Reminders

# ── Schedule (all times UTC) ───────────────────────────────────────────────────
# Eastern time observes DST:
#   EDT (Mar–Nov, UTC-4):  9 AM EDT = 13:00 UTC  |  6 PM EDT = 22:00 UTC
#   EST (Nov–Mar, UTC-5):  9 AM EST = 14:00 UTC  |  6 PM EST = 23:00 UTC
#
# Crons below target EDT. Update hours to 14/23 in November when clocks fall back.
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 13 * * 2" # Tuesday  9:00 AM EDT  → tuesday emails (assignment)
    - cron: "0 22 * * 1" # Monday   6:00 PM EDT  → monday emails  (check-in)

  # Manual trigger - dispatch from the Actions tab or via the dashboard button.
  # "auto" detects today's weekday in EST and picks tuesday/monday automatically.
  workflow_dispatch:
    inputs:
      mode:
        description: "Which email batch to send"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - tuesday
          - monday

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo so the script and HTML templates are available.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install runtime dependencies.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Resolve which mode to run:
      #    workflow_dispatch/auto → inspect weekday in EST and pick tuesday/monday
      #    workflow_dispatch/tuesday|monday → use chosen value directly
      #    schedule Tuesday cron  → tuesday
      #    schedule Monday cron   → monday
      - name: Resolve mode
        id: resolve
        run: |
          EVENT="${{ github.event_name }}"
          INPUT="${{ github.event.inputs.mode }}"
          SCHEDULE="${{ github.event.schedule }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$INPUT" = "auto" ]; then
              # %u: 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat 7=Sun
              DOW=$(TZ="America/New_York" date +%u)
              if [ "$DOW" = "1" ]; then
                echo "mode=monday" >> "$GITHUB_OUTPUT"
              else
                echo "mode=tuesday" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$SCHEDULE" = "0 13 * * 2" ]; then
            echo "mode=tuesday" >> "$GITHUB_OUTPUT"
          else
            echo "mode=monday" >> "$GITHUB_OUTPUT"
          fi

      # 5. Send emails. Secrets injected as env vars.
      #    Optional: SMTP_HOST, SMTP_PORT (or SMTP_PORT_SSL + SMTP_PORT_TLS), SMTP_FROM_EMAIL
      #    - add as repo secrets if not using default smtp.gmail.com + SMTP_PORT=465.
      - name: Send reminders (${{ steps.resolve.outputs.mode }})
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT_SSL: ${{ secrets.SMTP_PORT_SSL }}
          SMTP_PORT_TLS: ${{ secrets.SMTP_PORT_TLS }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python -m lib.emailer ${{ steps.resolve.outputs.mode }}
