name: Chore Reminders

# ── Schedule (all times UTC) ───────────────────────────────────────────────────
# Eastern time observes DST:
#   EDT (Mar–Nov, UTC-4):  9 AM EDT = 13:00 UTC  |  6 PM EDT = 22:00 UTC
#   EST (Nov–Mar, UTC-5):  9 AM EST = 14:00 UTC  |  6 PM EST = 23:00 UTC
#
# Crons below target EDT. Update hours to 14/23 in November when clocks fall back.
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 13 * * 1"   # Monday  9:00 AM EDT  → monday emails
    - cron: "0 22 * * 0"   # Sunday  6:00 PM EDT  → sunday emails

  # Manual trigger — dispatch from the Actions tab or via the dashboard button.
  # "auto" detects today's weekday in EST and picks monday/sunday automatically.
  workflow_dispatch:
    inputs:
      mode:
        description: "Which email batch to send"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - monday
          - sunday

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo so the script and HTML templates are available.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install runtime dependencies.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Resolve which mode to run:
      #    workflow_dispatch/auto → inspect weekday in EST (UTC-4)
      #    workflow_dispatch/monday|sunday → use chosen value directly
      #    schedule Monday cron  → monday
      #    schedule Sunday cron  → sunday
      - name: Resolve mode
        id: resolve
        run: |
          EVENT="${{ github.event_name }}"
          INPUT="${{ github.event.inputs.mode }}"
          SCHEDULE="${{ github.event.schedule }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$INPUT" = "auto" ]; then
              # weekday: 0=Mon 1=Tue … 6=Sun (GNU date, UTC-4)
              DOW=$(TZ="America/New_York" date +%u)
              if [ "$DOW" = "7" ]; then
                echo "mode=sunday" >> "$GITHUB_OUTPUT"
              else
                echo "mode=monday" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$SCHEDULE" = "0 13 * * 1" ]; then
            echo "mode=monday" >> "$GITHUB_OUTPUT"
          else
            echo "mode=sunday" >> "$GITHUB_OUTPUT"
          fi

      # 5. Send emails. Secrets injected as env vars.
      - name: Send reminders (${{ steps.resolve.outputs.mode }})
        env:
          SMTP_USERNAME:            ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:            ${{ secrets.SMTP_PASSWORD }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python chores_emailer.py ${{ steps.resolve.outputs.mode }}
